name: Scheduler Trigger

on:
   workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger trading bot workflow
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.PAT_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/anandtyagaraj/algo-options/actions/workflows/trading-bot.yml/dispatches  \
            -d '{"ref":"main","inputs":{"trigger_source":"internal_scheduler"}}'
