name: Kalman PE Scheduler Trigger

on:
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Kalman workflow
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.PAT_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/anandtyagaraj/algo-options/actions/workflows/kalman-trigger.yml/dispatches  \
            -d '{"ref":"main","inputs":{"option_type":"PE"}}'
